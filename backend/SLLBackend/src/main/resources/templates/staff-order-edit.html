<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{staff.order.edit.title} + ' | ' + #{app.name}">Edit Order Status | Salon Loan Loan</title>
    
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Page CSS -->
    <link rel="stylesheet" th:href="@{/css/staff-order-edit.css}">
    <!-- Staff Sidebar CSS -->
    <link rel="stylesheet" th:href="@{/css/staff-sidebar.css}">
</head>
<body>
    <div class="d-flex">
        <!-- Sidebar Fragment -->
        <div th:replace="fragments/staff-sidebar :: staff-sidebar"></div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header Fragment -->
            <div th:replace="fragments/staff-sidebar :: staff-header"></div>

            <main class="order-edit-main">
                <div class="container py-4">
                    <!-- Header -->
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h1 class="h4 m-0" th:text="#{staff.order.edit.title}">Edit Order Status</h1>
                        <a th:href="@{/staff/order/list}" class="btn btn-outline-secondary btn-sm">
                            <i class="fa-solid fa-arrow-left me-2"></i>
                            <span th:text="#{staff.order.edit.back}">Back to Order List</span>
                        </a>
                    </div>

                    <!-- Error Alert -->
                    <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                        <i class="fa-solid fa-exclamation-circle me-2"></i>
                        <span th:text="${param.error}">Error message</span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <!-- Order Information Card -->
                    <div class="card shadow-sm mb-4">
                        <div class="card-header bg-light">
                            <h5 class="card-title mb-0">
                                <i class="fa-solid fa-info-circle me-2"></i>
                                <span th:text="#{staff.order.edit.order.info}">Order Information</span>
                            </h5>
                        </div>
                        <div class="card-body">
                            <div class="row g-3">
                                <div class="col-md-6 col-lg-4">
                                    <div class="info-item">
                                        <label class="info-label" th:text="#{order.details.order.id}">Order ID</label>
                                        <div class="info-value fw-bold" th:text="${order.id}">123</div>
                                    </div>
                                </div>
                                <div class="col-md-6 col-lg-4">
                                    <div class="info-item">
                                        <label class="info-label" th:text="#{order.details.order.date}">Order Date</label>
                                        <div class="info-value" th:text="${#temporals.format(order.createdAt, 'dd MMM yyyy HH:mm')}">01 Jan 2024 10:00</div>
                                    </div>
                                </div>
                                <div class="col-md-6 col-lg-4">
                                    <div class="info-item">
                                        <label class="info-label" th:text="#{order.history.customer}">Customer</label>
                                        <div class="info-value" th:text="${order.customerInfo.name}">Customer Name</div>
                                    </div>
                                </div>
                                <div class="col-md-6 col-lg-4">
                                    <div class="info-item">
                                        <label class="info-label" th:text="#{order.details.status}">Current Status</label>
                                        <span class="badge rounded-pill order-status" 
                                              th:classappend="' status-' + ${#strings.toLowerCase(order.orderStatus)}"
                                              th:text="${order.orderStatus}">PENDING</span>
                                    </div>
                                </div>
                                <div class="col-md-6 col-lg-4">
                                    <div class="info-item">
                                        <label class="info-label" th:text="#{staff.orders.total}">Total Amount</label>
                                        <div class="info-value fw-bold text-success" th:text="${order.totalPrice} + ' ' + #{currency.unit}">0 VND</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Edit Status Form -->
                    <div class="card shadow-sm">
                        <div class="card-header bg-light">
                            <h5 class="card-title mb-0">
                                <i class="fa-solid fa-edit me-2"></i>
                                <span th:text="#{staff.order.edit.update.status}">Update Order Status</span>
                            </h5>
                        </div>
                        <div class="card-body">
                            <form id="editStatusForm" th:action="@{/staff/order/edit}" method="post" novalidate>
                                <input type="hidden" name="orderId" th:value="${order.id}" />
                                
                                <div class="mb-4">
                                    <label for="orderStatus" class="form-label fw-semibold">
                                        <span th:text="#{staff.order.edit.new.status}">New Status</span>
                                        <span class="text-danger">*</span>
                                    </label>
                                    <select id="orderStatus" name="orderStatus" class="form-select" required>
                                        <option value="" th:text="#{staff.order.edit.select.status}">-- Select New Status --</option>
                                        <option th:each="status : ${orderStatuses}" 
                                                th:value="${status}" 
                                                th:text="${status}"
                                                th:selected="${status == order.orderStatus}">
                                            PENDING
                                        </option>
                                    </select>
                                    <div class="form-text" th:text="#{staff.order.edit.select.status.help}">Select the new status for this order</div>
                                    <div class="invalid-feedback" id="statusError" th:text="#{staff.order.edit.status.required}">Please select a status</div>
                                </div>

                                <div class="form-actions">
                                    <div class="row">
                                        <div class="col-md-6 mb-3 mb-md-0">
                                            <a th:href="@{/staff/order/list}" class="btn btn-outline-secondary btn-lg w-100">
                                                <i class="fa-solid fa-times me-2"></i>
                                                <span th:text="#{btn.cancel}">Cancel</span>
                                            </a>
                                        </div>
                                        <div class="col-md-6">
                                            <button type="submit" class="btn btn-primary btn-lg w-100">
                                                <i class="fa-solid fa-save me-2"></i>
                                                <span th:text="#{staff.order.edit.update}">Update Status</span>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <div th:replace="fragments/staff-sidebar :: staff-scripts"></div>
    <script>
        (function() {
            const form = document.getElementById('editStatusForm');
            const statusSelect = document.getElementById('orderStatus');
            const statusError = document.getElementById('statusError');
            const currentStatus = /*[[${order.orderStatus}]]*/ '';

            // Form validation
            form.addEventListener('submit', function(e) {
                let isValid = true;

                // Reset validation state
                statusSelect.classList.remove('is-invalid');
                statusError.style.display = 'none';

                // Validate status selection
                if (!statusSelect.value) {
                    statusSelect.classList.add('is-invalid');
                    statusError.style.display = 'block';
                    isValid = false;
                }

                // Check if status has changed
                if (statusSelect.value === currentStatus) {
                    e.preventDefault();
                    alert(/*[[#{staff.order.edit.status.unchanged}]]*/ 'Please select a different status to update');
                    return false;
                }

                if (!isValid) {
                    e.preventDefault();
                    e.stopPropagation();
                }

                form.classList.add('was-validated');
                return isValid;
            });

            // Real-time validation
            statusSelect.addEventListener('change', function() {
                if (this.value) {
                    this.classList.remove('is-invalid');
                    statusError.style.display = 'none';
                }
            });
        })();
    </script>
</body>
</html>
