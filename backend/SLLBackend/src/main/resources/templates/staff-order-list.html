<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale}">
<head>
    <meta charset="UTF-8" />
    <title th:text="#{staff.orders.title} + ' | ' + #{app.name}">Staff - Manage Orders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/staff-order-list.css}">
    <link rel="stylesheet" th:href="@{/css/staff-sidebar.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="d-flex">
    <!-- Sidebar -->
    <div th:replace="fragments/staff-sidebar :: staff-sidebar"></div>
    <!-- Main -->
    <div class="main-content flex-grow-1">
        <div th:replace="fragments/staff-sidebar :: staff-header"></div>

        <main class="container py-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h1 class="h4 m-0" th:text="#{staff.orders.title}">Manage Orders</h1>
                <!-- <a href="/auth/staff/landing" class="btn btn-outline-secondary btn-sm" th:text="#{btn.back.to.home}">Back</a> -->
            </div>

            <div th:if="${param.success}" class="alert alert-success" role="alert">
                <span th:text="${param.success}">Success message</span>
            </div>
            <div th:if="${param.error}" class="alert alert-danger" role="alert">
                <span th:text="${param.error}">Error message</span>
            </div>

            <div th:if="${#lists.isEmpty(orders)}" class="card shadow-sm p-4 text-center">
                <h2 class="text-muted h5" th:text="#{staff.orders.empty}">No Orders Yet</h2>
                <p class="text-secondary" th:text="#{staff.orders.empty.desc}">No orders have been placed in the system.</p>
            </div>

            <div th:if="${!#lists.isEmpty(orders)}" class="vstack gap-3">
                <div th:each="order : ${orders}" class="card shadow-sm">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-3">
                            <div>
                                <div class="fw-bold">#<span th:text="${order.id}">123</span></div>
                                <div class="text-muted small" th:text="${#temporals.format(order.createdAt, 'dd MMM yyyy HH:mm')}">01 Jan 2024 10:00</div>
                            </div>
                            <span class="badge rounded-pill order-status" th:classappend="' status-' + ${#strings.toLowerCase(order.orderStatus)}"
                                  th:text="${order.orderStatus}">PENDING</span>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-md-4">
                                <div class="text-muted small" th:text="#{label.full.name}">Customer Name</div>
                                <div class="fw-semibold" th:text="${order.customerInfo.name}">Customer</div>
                            </div>
                            <div class="col-md-4">
                                <div class="text-muted small" th:text="#{label.phone.number}">Phone Number</div>
                                <div class="fw-semibold" th:text="${order.customerInfo.phoneNumber}">0123</div>
                            </div>
                            <div class="col-md-4">
                                <div class="text-muted small" th:text="#{label.payment.method}">Payment Method</div>
                                <div class="fw-semibold" th:text="${order.paymentMethod}">BANK_TRANSFER</div>
                            </div>
                            <div class="col-12">
                                <div class="text-muted small" th:text="#{label.shipping.address}">Shipping Address</div>
                                <div class="fw-semibold" th:text="${order.customerInfo.shippingAddress}">Address</div>
                            </div>
                            <div class="col-md-4">
                                <div class="text-muted small" th:text="#{staff.orders.total}">Total Amount</div>
                                <div class="fw-bold text-success" th:text="${order.totalPrice} + ' ' + #{currency.unit}">0 VND</div>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <a th:href="@{/staff/order/edit(orderId=${order.id})}" class="btn btn-dark btn-sm" th:text="#{staff.orders.edit}">Edit Status</a>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<div th:replace="fragments/staff-sidebar :: staff-scripts"></div>
</body>
</html>
