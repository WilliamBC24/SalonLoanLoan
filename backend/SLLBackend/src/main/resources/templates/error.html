<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="#{error.page.title} + ' | ' + #{app.name}">Error | Salon Loan Loan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/error.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta name="robots" content="noindex" />
    <meta name="color-scheme" content="light dark" />
    <style>
        /* Minimal safe fallback if CSS fails to load */
        .fallback { font-family: Poppins, Arial, sans-serif; padding: 40px 16px; }
    </style>
    <script>
        // Prevent the stack trace from flashing expanded
        document.addEventListener('DOMContentLoaded', function(){
            var btn = document.getElementById('toggleDetails');
            var panel = document.getElementById('errorDetails');
            if (btn && panel) {
                btn.addEventListener('click', function(){
                    panel.classList.toggle('show');
                });
            }
        });
    </script>
    <link rel="icon" href="data:," />
    <meta name="theme-color" content="#1e3a8a" />
    <meta http-equiv="Cache-Control" content="no-store" />
</head>
<body class="error-body">
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm border-0 overflow-hidden">
                <div class="card-body p-4 p-md-5 text-center">
                    <div class="error-icon mb-3">
                        <i class="fa-solid fa-triangle-exclamation"></i>
                    </div>
                    <h1 class="display-6 fw-bold mb-2" th:text="${title} ?: #{error.heading}">Something went wrong!</h1>
                    <p class="text-muted mb-4" th:text="${message} ?: #{error.message.default}">An unexpected error occurred. Please try again.</p>

                    <div class="d-flex flex-column flex-md-row justify-content-center gap-2">
                        <a href="#" class="btn btn-primary" th:onclick="|if(window.history.length>1){window.history.back();}else{window.location.href='@{/}'}; return false;|">
                            <i class="fa-solid fa-arrow-left me-2"></i> <span th:text="#{btn.back}">Back</span>
                        </a>
                        <a th:href="@{/}" class="btn btn-outline-secondary">
                            <i class="fa-solid fa-house me-2"></i> <span th:text="#{btn.home}">Home</span>
                        </a>
                        <button id="toggleDetails" type="button" class="btn btn-outline-dark">
                            <i class="fa-solid fa-circle-info me-2"></i> <span th:text="#{error.details}">Details</span>
                        </button>
                    </div>
                </div>

                <div id="errorDetails" class="collapse border-top">
                    <div class="p-3 p-md-4 bg-light-subtle error-details-wrap">
                        <div class="small text-muted mb-2" th:text="#{error.technical.info}">Technical information (for debugging):</div>
                        <pre class="error-pre mb-0" th:text="${exception} ?: #{error.no.stacktrace}">No stack trace available</pre>
                    </div>
                </div>
            </div>

            <div class="text-center mt-3 small text-muted">
                <span>&copy; <span th:text="${#dates.format(#dates.createNow(),'yyyy')}">2025</span> <span th:text="#{app.name}">Salon Loan Loan</span></span>
            </div>
        </div>
    </div>
</main>

<div class="fallback d-none" aria-hidden="true">
    <h1 th:text="#{error.heading}">Something went wrong!</h1>
    <p th:text="#{error.fallback.tryagain}">Please try again or return to Home.</p>
    <p class="small" th:text="#{error.fallback.contact}">If the problem persists, contact support.</p>
    <a th:href="@{/}" th:text="#{btn.home}">Home</a>
    <a href="#" onclick="history.back();return false;" th:text="#{btn.back}">Back</a>
    <pre th:text="${exception} ?: #{error.no.stacktrace}"></pre>
    <!-- This block remains hidden unless CSS fails to load -->
    <!-- d-none class will hide it when bootstrap is loaded -->
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
