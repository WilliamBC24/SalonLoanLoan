<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="#{admin.job.posting.create} + ' | ' + #{app.name}">Create Job Posting | Salon Loan Loan</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <!-- Page CSS -->
    <link rel="stylesheet" th:href="@{/css/admin-job-posting-create.css}">
</head>
<body class="bg-light">

    <div class="container-fluid px-0">
        <!-- Header -->
        <div th:replace="fragments/admin-header :: admin-header"></div>

        <!-- Content -->
        <div class="content-area">
            <div class="container py-4">
                <h1 class="page-title mb-4" th:text="#{admin.job.posting.create}">Create Job Posting</h1>

                <!-- Success/Error Messages -->
                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="fa-solid fa-check-circle me-2"></i>
                    <span th:text="${successMessage}">Success message</span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="fa-solid fa-exclamation-circle me-2"></i>
                    <span th:text="${errorMessage}">Error message</span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- Form Card -->
                <div class="card shadow-sm border-0 form-card">
                    <div class="card-body p-4">
                        <form th:action="@{/admin/job/create}" method="post" class="needs-validation" novalidate>
                            <div class="mb-3">
                                <label class="form-label fw-semibold" for="jobPostingName" th:text="#{admin.job.posting.form.title}">Job Title</label>
                                <input class="form-control" type="text" id="jobPostingName" name="jobPostingName" th:placeholder="#{admin.job.posting.form.title}" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-semibold" for="jobPostingDescription" th:text="#{admin.job.posting.form.description}">Description</label>
                                <textarea class="form-control" id="jobPostingDescription" name="jobPostingDescription" rows="4" th:placeholder="#{admin.job.posting.form.description}" required></textarea>
                            </div>

                            <div class="row g-3">
                                <div class="col-md-4">
                                    <label class="form-label fw-semibold" for="maxApplication" th:text="#{admin.job.posting.form.max.application}">Max Applications</label>
                                    <input class="form-control" type="number" id="maxApplication" name="maxApplication" min="1" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-semibold" for="effectiveFrom" th:text="#{admin.job.posting.form.effective.from}">Effective From</label>
                                    <input class="form-control" type="date" id="effectiveFrom" name="effectiveFrom" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-semibold" for="effectiveTo" th:text="#{admin.job.posting.form.effective.to}">Effective To (optional)</label>
                                    <input class="form-control" type="date" id="effectiveTo" name="effectiveTo">
                                </div>
                            </div>

                            <div class="mt-3">
                                <label class="form-label fw-semibold" for="status" th:text="#{label.status}">Status</label>
                                <select class="form-select" id="status" name="status">
                                    <option th:value="ACTIVE" th:text="#{admin.job.posting.status.active}">ACTIVE</option>
                                    <option th:value="DEACTIVATED" th:text="#{admin.job.posting.status.deactivated}" selected>DEACTIVATED</option>
                                </select>
                            </div>

                            <div class="mt-4 d-flex gap-2">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-plus me-2"></i>
                                    <span th:text="#{btn.create}">Create</span>
                                </button>
                                <button type="button" class="btn btn-secondary" th:onclick="'window.location.href=\'' + @{/admin/job/list} + '\''">
                                    <i class="fas fa-times me-2"></i>
                                    <span th:text="#{btn.cancel}">Cancel</span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
