<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="#{order.checkout.title} + ' | ' + #{app.name}">Checkout | Salon Loan Loan</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Global site styles for header/footer fragments -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Page CSS -->
    <link rel="stylesheet" th:href="@{/css/order-checkout.css}">
</head>
<body class="bg-light">
    <div th:replace="fragments/header :: top-header"></div>
    <div th:replace="fragments/header :: navbar"></div>
    
    <!-- Breadcrumb Section -->
    <div th:replace="fragments/breadcrumb :: breadcrumb(current=#{order.checkout.title}, parent=null, parentUrl=null)"></div>
    
    <section class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1 class="h3 m-0" th:text="#{order.checkout.title}">Checkout</h1>
            <a th:href="@{/cart}" class="text-decoration-none">
                <i class="fa-solid fa-arrow-left me-1"></i>
                <span th:text="#{order.checkout.back.to.cart}">Back to Cart</span>
            </a>
        </div>

        <div th:if="${param.error}" class="alert alert-danger">
            <i class="fa-solid fa-circle-exclamation me-2"></i>
            <span th:text="${param.error}">Error message</span>
        </div>

        <div class="checkout-grid">
            <div class="card shadow-sm border-0 p-3 p-md-4">
                <form id="checkoutForm" action="/order/checkout" method="post" onsubmit="return validateForm()">
                
                <!-- Customer Information -->
                <div class="form-section mb-4">
                    <h2 class="section-title" th:text="#{order.checkout.section.customer}">1. Customer Information</h2>
                    <div class="form-group">
                        <label for="customerName" th:text="#{label.full.name} + ' *'">Full Name *</label>
                        <input type="text" id="customerName" name="customerName" required />
                        <span class="error" id="nameError" th:text="#{validation.full.name}">Please enter your full name</span>
                    </div>
                    <div class="form-group">
                        <label for="phoneNumber" th:text="#{label.phone.number} + ' *'">Phone Number *</label>
                        <input type="tel" id="phoneNumber" name="phoneNumber" 
                               placeholder="0123456789" required />
                        <span class="error" id="phoneError" th:text="#{validation.phone}">Please enter a valid phone number</span>
                    </div>
                </div>

                <!-- Delivery Information -->
                <div class="form-section mb-4">
                    <h2 class="section-title" th:text="#{order.checkout.section.delivery}">2. Delivery Address</h2>
                    <div class="form-group">
                        <label for="shippingAddress" th:text="#{label.shipping.address} + ' *'">Shipping Address *</label>
                        <textarea id="shippingAddress" name="shippingAddress" 
                                  placeholder="Enter your complete address" required></textarea>
                        <span class="error" id="addressError" th:text="#{validation.address}">Please enter your shipping address</span>
                    </div>
                </div>

                <!-- Payment Method -->
                <div class="form-section mb-3">
                    <h2 class="section-title" th:text="#{order.checkout.section.payment}">3. Payment Method</h2>
                    <div class="payment-options d-flex gap-3 flex-wrap">
                        <label class="payment-option" onclick="selectPayment(this)">
                            <input type="radio" name="paymentMethod" value="BANK_TRANSFER" required />
                            <div>
                                <strong th:text="#{payment.bank_transfer.title}">Bank Transfer</strong>
                                <p class="payment-desc" th:text="#{payment.bank_transfer.desc}">Pay via bank transfer</p>
                            </div>
                        </label>
                        <label class="payment-option" onclick="selectPayment(this)">
                            <input type="radio" name="paymentMethod" value="COD" required />
                            <div>
                                <strong th:text="#{payment.cod.title}">Cash on Delivery</strong>
                                <p class="payment-desc" th:text="#{payment.cod.desc}">Pay when you receive</p>
                            </div>
                        </label>
                    </div>
                    <span class="error" id="paymentError" th:text="#{validation.payment.method}">Please select a payment method</span>
                </div>

                <button type="submit" class="btn btn-success w-100 fw-semibold place-order-btn" th:text="#{button.place.order}">Place Order</button>
                </form>
            </div>

            <!-- Order Summary -->
            <div class="order-summary card shadow-sm border-0 h-fit-content">
                <div class="card-body">
                    <h2 class="section-title" th:text="#{order.checkout.summary}">Order Summary</h2>
                    <div class="summary-item">
                        <span th:text="#{order.checkout.summary.items}">Items:</span>
                        <span th:text="${cartSummary.itemCount}">0</span>
                    </div>
                    <div class="summary-item">
                        <span th:text="#{order.checkout.summary.subtotal}">Subtotal:</span>
                        <span th:text="${cartSummary.totalPrice} + ' VND'">0 VND</span>
                    </div>
                    <div class="summary-total">
                        <span th:text="#{order.checkout.summary.total}">Total:</span>
                        <span th:text="${cartSummary.totalPrice} + ' VND'">0 VND</span>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <div th:replace="fragments/footer :: footer"></div>

    <script>
        function selectPayment(element) {
            // Remove selected class from all options
            document.querySelectorAll('.payment-option').forEach(opt => {
                opt.classList.remove('selected');
            });
            // Add selected class to clicked option
            element.classList.add('selected');
        }

        function validateForm() {
            let isValid = true;

            // Reset errors
            document.querySelectorAll('.error').forEach(err => err.style.display = 'none');

            // Validate name
            const name = document.getElementById('customerName').value.trim();
            if (name.length < 2) {
                document.getElementById('nameError').style.display = 'block';
                isValid = false;
            }

            // Validate phone
            const phone = document.getElementById('phoneNumber').value.trim();
            const phoneRegex = /^[0-9]{10,11}$/;
            if (!phoneRegex.test(phone)) {
                document.getElementById('phoneError').style.display = 'block';
                isValid = false;
            }

            // Validate address
            const address = document.getElementById('shippingAddress').value.trim();
            if (address.length < 10) {
                document.getElementById('addressError').style.display = 'block';
                isValid = false;
            }

            // Validate payment method
            const paymentSelected = document.querySelector('input[name="paymentMethod"]:checked');
            if (!paymentSelected) {
                document.getElementById('paymentError').style.display = 'block';
                isValid = false;
            }

            return isValid;
        }

        // Add real-time validation
        document.getElementById('customerName').addEventListener('blur', function() {
            if (this.value.trim().length < 2) {
                document.getElementById('nameError').style.display = 'block';
            } else {
                document.getElementById('nameError').style.display = 'none';
            }
        });

        document.getElementById('phoneNumber').addEventListener('blur', function() {
            const phoneRegex = /^[0-9]{10,11}$/;
            if (!phoneRegex.test(this.value.trim())) {
                document.getElementById('phoneError').style.display = 'block';
            } else {
                document.getElementById('phoneError').style.display = 'none';
            }
        });

        document.getElementById('shippingAddress').addEventListener('blur', function() {
            if (this.value.trim().length < 10) {
                document.getElementById('addressError').style.display = 'block';
            } else {
                document.getElementById('addressError').style.display = 'none';
            }
        });
    </script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
