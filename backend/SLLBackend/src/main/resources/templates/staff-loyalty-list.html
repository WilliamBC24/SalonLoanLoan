<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{staff.loyalty.title} + ' | ' + #{app.name}">Manage Loyalty | Salon Loan Loan</title>
    
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Page CSS -->
    <link rel="stylesheet" th:href="@{/css/staff-loyalty-list.css}">
    <!-- Staff Sidebar CSS -->
    <link rel="stylesheet" th:href="@{/css/staff-sidebar.css}">
</head>
<body>
    <div class="d-flex">
        <!-- Sidebar Fragment -->
        <div th:replace="fragments/staff-sidebar :: staff-sidebar"></div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header Fragment -->
            <div th:replace="fragments/staff-sidebar :: staff-header"></div>

            <main class="loyalty-list-main">
                <div class="container py-4">
                    <!-- Page Header -->
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h1 class="h4 m-0" th:text="#{staff.loyalty.title}">Manage Loyalty</h1>
                    </div>

                    <!-- Search Bar -->
                    <div class="card shadow-sm mb-4">
                        <div class="card-body">
                            <form method="get" th:action="@{/staff/loyalty/list}" class="loyalty-search-form">
                                <!-- Search by Username -->
                                <div class="mb-3">
                                    <label for="search-username" class="form-label fw-semibold mb-2">
                                        <span th:text="#{staff.loyalty.search.username}">Search by Username</span>
                                    </label>
                                    <input type="text" 
                                           id="search-username" 
                                           name="username"
                                           class="form-control"
                                           th:value="${username}"
                                           th:placeholder="#{staff.loyalty.search.placeholder}">
                                </div>
                                <!-- Action Buttons -->
                                <div class="d-flex gap-2 mt-3">
                                    <button type="submit" class="btn btn-primary">
                                        <i class="fa-solid fa-search me-2"></i>
                                        <span th:text="#{btn.search}">Search</span>
                                    </button>
                                    <a th:href="@{/staff/loyalty/list}" class="btn btn-secondary">
                                        <i class="fa-solid fa-rotate me-2"></i>
                                        <span th:text="#{btn.reset}">Reset</span>
                                    </a>
                                </div>
                            </form>
                        </div>
                    </div>

                    <!-- Loyalty Table -->
                    <div class="card shadow-sm">
                        <div class="card-header bg-light">
                            <h5 class="card-title mb-0">
                                <i class="fa-solid fa-list me-2"></i>
                                <span th:text="#{staff.loyalty.list.title}">Loyalty Accounts</span>
                            </h5>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover mb-0">
                                    <thead class="table-light">
                                        <tr>
                                            <th class="text-center" style="width: 60px;" th:text="#{staff.loyalty.table.no}">#</th>
                                            <th th:text="#{label.username}">Username</th>
                                            <th class="text-center" th:text="#{staff.loyalty.table.points}">Points</th>
                                            <th class="text-center" th:text="#{staff.loyalty.table.level}">Level</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="loyalty, iterStat : ${loyaltyList}">
                                            <td class="text-center fw-bold" th:text="${iterStat.count}">1</td>
                                            <td>
                                                <div class="d-flex align-items-center">
                                                    <i class="fa-solid fa-user-circle me-2 text-muted"></i>
                                                    <span class="fw-semibold" th:text="${loyalty.username}">username</span>
                                                </div>
                                            </td>
                                            <td class="text-center">
                                                <span class="badge bg-primary rounded-pill px-3 py-2" th:text="${loyalty.point}">0</span>
                                            </td>
                                            <td class="text-center">
                                                <span class="badge bg-success rounded-pill px-3 py-2" th:text="${loyalty.level.name}">Bronze</span>
                                            </td>
                                        </tr>
                                        <tr th:if="${#lists.isEmpty(loyaltyList)}">
                                            <td colspan="4" class="text-center py-5">
                                                <div class="empty-state">
                                                    <i class="fa-solid fa-inbox fa-3x text-muted mb-3"></i>
                                                    <p class="text-muted mb-0" th:text="#{staff.loyalty.empty}">No records found.</p>
                                                </div>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <div th:replace="fragments/staff-sidebar :: staff-scripts"></div>
</body>
</html>
