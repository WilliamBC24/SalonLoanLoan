<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="#{admin.job.posting.list.page.title} + ' | ' + #{app.name}">Admin - Job Postings List | Salon Loan Loan</title>
    
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <!-- Your CSS -->
    <link rel="stylesheet" th:href="@{/css/admin-job-posting-list.css}">
</head>
<body class="bg-light">
    
    <!-- Main Container -->
    <div class="container-fluid px-0">
        <!-- Header Fragment with Add Job Posting Button -->
        <div th:replace="fragments/admin-header :: admin-header-with-add-job"></div>

        <!-- Content -->
        <div class="content-area">
            <div class="container py-4">
                <h1 class="page-title mb-4" th:text="#{admin.job.posting.title}">Admin - Manage Job Postings</h1>

                <!-- Success/Error Messages -->
                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="fa-solid fa-check-circle me-2"></i>
                    <span th:text="${successMessage}">Success message</span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="fa-solid fa-exclamation-circle me-2"></i>
                    <span th:text="${errorMessage}">Error message</span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- Search and Filter Section -->
                <div class="search-section bg-white p-4 rounded shadow-sm mb-4">
                    <form method="get" th:action="@{/admin/job/list}">
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label for="search-title" class="form-label fw-semibold" th:text="#{admin.job.posting.search.title}">Search by Job Title:</label>
                                <input type="text" class="form-control" id="search-title" name="title"
                                       th:value="${searchTitle}"
                                       th:placeholder="#{admin.job.posting.search.placeholder}">
                            </div>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-md-12">
                                <label class="form-label fw-semibold" th:text="#{admin.job.posting.filter.status}">Status:</label>
                                <div class="d-flex flex-wrap gap-3">
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="status" id="status-all" value=""
                                               th:checked="${selectedStatus == null}">
                                        <label class="form-check-label" for="status-all" th:text="#{admin.job.posting.filter.all}">All</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="status" id="status-active" value="ACTIVE"
                                               th:checked="${selectedStatus == 'ACTIVE'}">
                                        <label class="form-check-label" for="status-active" th:text="#{admin.job.posting.filter.active}">Active Only</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="status" id="status-deactivated" value="DEACTIVATED"
                                               th:checked="${selectedStatus == 'DEACTIVATED'}">
                                        <label class="form-check-label" for="status-deactivated" th:text="#{admin.job.posting.filter.deactivated}">Deactivated Only</label>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-search me-2"></i>
                                <span th:text="#{btn.search}">Search</span>
                            </button>
                            <button type="button" class="btn btn-secondary" th:onclick="'window.location.href=\'' + @{/admin/job/list} + '\''">
                                <i class="fas fa-undo me-2"></i>
                                <span th:text="#{btn.reset}">Reset</span>
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Job Postings List Table -->
                <div class="table-container bg-white rounded shadow-sm overflow-hidden">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th th:text="#{admin.job.posting.table.id}">ID</th>
                                    <th th:text="#{admin.job.posting.table.title}">Job Title</th>
                                    <th th:text="#{admin.job.posting.table.status}">Status</th>
                                    <th th:text="#{admin.job.posting.table.actions}">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="job : ${jobs}">
                                    <td th:text="${job.id}">1</td>
                                    <td th:text="${job.jobPostingName}">Do Hair</td>
                                    <td>
                                        <span th:if="${job.status != null and job.status.name() == 'ACTIVE'}" class="badge bg-success" th:text="#{admin.job.posting.status.active}">ACTIVE</span>
                                        <span th:if="${job.status != null and job.status.name() == 'DEACTIVATED'}" class="badge bg-secondary" th:text="#{admin.job.posting.status.deactivated}">DEACTIVATED</span>
                                    </td>
                                    <td>
                                        <a th:href="@{/admin/job/view/{id}(id=${job.id})}" class="btn btn-sm btn-outline-primary">
                                            <i class="fas fa-eye me-1"></i>
                                            <span th:text="#{admin.job.posting.view.details}">View Details</span>
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
