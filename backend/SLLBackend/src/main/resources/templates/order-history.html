<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale}">
<head>
    <meta charset="UTF-8" />
    <title th:text="#{order.history.title}">Order History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/order-history.css}">
</head>
<body class="bg-light order-history-page">
    <div th:replace="fragments/header :: top-header"></div>
    <div th:replace="fragments/header :: navbar"></div>

    <div th:replace="fragments/breadcrumb :: breadcrumb(current=#{order.history.title}, parent=null, parentUrl=null )"></div>

    <main class="container py-4 mb-5">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1 class="h3 m-0" th:text="#{order.history.title}">Order History</h1>
            <a href="/products" class="text-decoration-none">← <span th:text="#{order.history.back.to.products}">Back to Products</span></a>
        </div>

        <div th:if="${param.error}" class="alert alert-danger" role="alert">
            <span th:text="${param.error}">Error message</span>
        </div>

        <div th:if="${#lists.isEmpty(orders)}" class="card shadow-sm border-0 p-4 text-center">
            <h2 class="text-muted mb-2" th:text="#{order.history.empty.title}">No Orders Yet</h2>
            <p class="text-secondary mb-3" th:text="#{order.history.empty.subtitle}">You haven't placed any orders. Start shopping now!</p>
            <a href="/products" class="btn btn-primary" th:text="#{order.history.browse}">Browse Products</a>
        </div>

        <div th:if="${!#lists.isEmpty(orders)}" class="order-list d-flex flex-column gap-3">
            <div th:each="order : ${orders}" class="order-card card shadow-sm border-0 p-3 p-md-4">
                <div class="order-header d-flex justify-content-between align-items-center pb-2 mb-2 border-bottom">
                    <div>
                        <div class="order-id fw-bold">#<span th:text="${order.id}">123</span></div>
                        <div class="order-date text-muted small" th:text="${#temporals.format(order.createdAt, 'dd MMM yyyy HH:mm')}">01 Jan 2024 10:00</div>
                    </div>
                    <span th:class="'order-status badge rounded-pill px-3 py-2 status-' + ${#strings.toLowerCase(order.orderStatus)}"
                          th:text="${order.orderStatus}">PENDING</span>
                </div>

                <div class="order-details row g-3 mb-2">
                    <div class="col-sm-6 col-lg-3">
                        <div class="detail-label text-muted small" th:text="#{order.history.customer}">Customer Name</div>
                        <div class="detail-value fw-semibold" th:text="${order.customerInfo.name}">Customer Name</div>
                    </div>
                    <div class="col-sm-6 col-lg-3">
                        <div class="detail-label text-muted small" th:text="#{label.phone.number}">Phone Number</div>
                        <div class="detail-value fw-semibold" th:text="${order.customerInfo.phoneNumber}">0123456789</div>
                    </div>
                    <div class="col-sm-6 col-lg-3">
                        <div class="detail-label text-muted small" th:text="#{order.details.payment.method}">Payment Method</div>
                        <div class="detail-value fw-semibold" th:text="${order.paymentMethod}">BANK_TRANSFER</div>
                    </div>
                    <div class="col-sm-6 col-lg-3">
                        <div class="detail-label text-muted small" th:text="#{order.history.total}">Total Amount</div>
                        <div class="detail-value order-total text-success fw-bold" th:text="${order.totalPrice} + ' ' + #{currency.unit}">0</div>
                    </div>
                </div>

                <div class="order-actions d-flex gap-2">
                    <a th:href="@{/order/details(orderId=${order.id})}" class="btn btn-primary" th:text="#{order.history.view.details}">View Details</a>
                    <a th:if="${order.orderStatus.name() == 'PENDING' or order.orderStatus.name() == 'CONFIRMED'}"
                       th:href="@{/order/cancel(orderId=${order.id})}"
                       class="btn btn-danger"
                       th:onclick="'return confirm(\'' + #{order.history.cancel.confirm} + '\')'"
                       th:text="#{order.history.cancel}">Cancel Order</a>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="fragments/footer :: footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
