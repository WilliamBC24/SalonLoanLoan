<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{staff.registration.title} + ' | ' + #{app.name}">Staff Registrations | Salon Loan Loan</title>
    
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Page CSS -->
    <link rel="stylesheet" th:href="@{/css/staff-registration-list.css}">
    <!-- Staff Sidebar CSS -->
    <link rel="stylesheet" th:href="@{/css/staff-sidebar.css}">
</head>
<body>
    <div class="d-flex">
        <!-- Sidebar Fragment -->
        <div th:replace="fragments/staff-sidebar :: staff-sidebar"></div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header Fragment -->
            <div th:replace="fragments/staff-sidebar :: staff-header"></div>

            <main class="registration-list-main">
                <div class="container py-4">
                    <!-- Page Header -->
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h1 class="h4 m-0" th:text="#{staff.registration.title}">Staff Registrations</h1>
                    </div>

                    <!-- Search Bar -->
                    <div class="card shadow-sm mb-4">
                        <div class="card-body">
                            <form method="get" th:action="@{/staff/registration/list}" class="registration-search-form">
                                <!-- Search by Name -->
                                <div class="mb-3">
                                    <label for="search-name" class="form-label fw-semibold mb-2">
                                        <span th:text="#{staff.registration.search.name}">Search by Name</span>
                                    </label>
                                    <input type="text" 
                                           id="search-name" 
                                           name="name"
                                           class="form-control"
                                           th:value="${searchName}"
                                           th:placeholder="#{staff.registration.search.placeholder}">
                                </div>

                                <!-- Registration Status Checkboxes -->
                                <div class="mb-3">
                                    <label class="form-label fw-semibold mb-2">
                                        <span th:text="#{staff.registration.status.label}">Registration Status</span>
                                    </label>
                                    <div class="checkbox-group">
                                        <div class="form-check form-check-inline" th:each="status : ${allStatuses}">
                                            <input class="form-check-input" 
                                                   type="checkbox" 
                                                   th:id="${status.name()}" 
                                                   name="statuses"
                                                   th:value="${status.name()}"
                                                   th:checked="${selectedStatuses != null and selectedStatuses.contains(status.name())}">
                                            <label class="form-check-label" th:for="${status.name()}" th:text="${status.name()}">STATUS</label>
                                        </div>
                                    </div>
                                </div>

                                <!-- Action Buttons -->
                                <div class="d-flex gap-2 mt-3">
                                    <button type="submit" class="btn btn-primary">
                                        <i class="fa-solid fa-search me-2"></i>
                                        <span th:text="#{btn.search}">Search</span>
                                    </button>
                                    <a th:href="@{/staff/registration/list}" class="btn btn-secondary">
                                        <i class="fa-solid fa-rotate me-2"></i>
                                        <span th:text="#{btn.reset}">Reset</span>
                                    </a>
                                </div>
                            </form>
                        </div>
                    </div>

                    <!-- Registrations Table -->
                    <div class="card shadow-sm">
                        <div class="card-header bg-light">
                            <h5 class="card-title mb-0">
                                <i class="fa-solid fa-list me-2"></i>
                                <span th:text="#{staff.registration.list.title}">Registrations List</span>
                            </h5>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover mb-0">
                                    <thead class="table-light">
                                        <tr>
                                            <th th:text="#{label.name}">Name</th>
                                            <th th:text="#{label.status}">Status</th>
                                            <th th:text="#{staff.registration.table.registered.at}">Registered At</th>
                                            <th th:text="#{staff.registration.table.scheduled.at}">Scheduled At</th>
                                            <th class="text-center" th:text="#{staff.registration.table.actions}">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="appointment : ${registrations}">
                                            <td>
                                                <div class="d-flex align-items-center">
                                                    <i class="fa-solid fa-user-circle me-2 text-muted"></i>
                                                    <span class="fw-semibold" th:text="${appointment.name}">Name</span>
                                                </div>
                                            </td>
                                            <td>
                                                <span class="badge rounded-pill" 
                                                      th:classappend="'status-' + ${#strings.toLowerCase(appointment.status)}"
                                                      th:text="${appointment.status}">PENDING</span>
                                            </td>
                                            <td th:text="${#temporals.format(appointment.registeredAt, 'yyyy-MM-dd HH:mm')}">2025-10-22 07:00</td>
                                            <td th:text="${appointment.scheduledAt != null ? #temporals.format(appointment.scheduledAt, 'yyyy-MM-dd HH:mm') : '—'}">—</td>
                                            <td class="text-center">
                                                <a th:href="@{/staff/registration/view/{id}(id=${appointment.id})}" 
                                                   class="btn btn-sm btn-outline-primary">
                                                    <i class="fa-solid fa-eye me-1"></i>
                                                    <span th:text="#{staff.registration.view.details}">View Details</span>
                                                </a>
                                            </td>
                                        </tr>
                                        <tr th:if="${#lists.isEmpty(registrations)}">
                                            <td colspan="5" class="text-center py-5">
                                                <div class="empty-state">
                                                    <i class="fa-solid fa-inbox fa-3x text-muted mb-3"></i>
                                                    <p class="text-muted mb-0" th:text="#{staff.registration.empty}">No registrations found.</p>
                                                </div>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <div th:replace="fragments/staff-sidebar :: staff-scripts"></div>
</body>
</html>
